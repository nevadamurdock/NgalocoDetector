name: Build NgalocoDetector

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch: # Memungkinkan menjalankan build secara manual

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Environment
        run: |
          sudo apt-get update
          sudo apt-get install -y zip tar

      - name: Build/Package Project
        run: |
          # Contoh: Mengompres file menjadi paket rilis
          mkdir output
          cp -r * output/ 2>/dev/null || true
          zip -r NgalocoDetector-build.zip output/

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: NgalocoDetector-Package
          path: NgalocoDetector-build.zip
