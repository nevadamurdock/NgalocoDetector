name: Build NgalocoDetector APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive # Memastikan jika ada submodule ikut terunduh

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Create local.properties
        run: |
          touch local.properties
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      - name: Fix Missing LSS Header
        run: |
          # Membuat direktori jika belum ada (sesuaikan dengan struktur folder library)
          mkdir -p library/src/main/cpp/include
          # Download linux_syscall_support.h dari chromium source
          curl -Lo library/src/main/cpp/include/linux_syscall_support.h https://chromium.googlesource.com/linux-syscall-support/+/master/linux_syscall_support.h?format=TEXT | base64 --decode > library/src/main/cpp/include/linux_syscall_support.h
          # Atau jika path-nya flat, kita taruh di folder src langsung
          cp library/src/main/cpp/include/linux_syscall_support.h library/src/main/cpp/src/linux_syscall_support.h

      - name: Grant Execute Permission for Gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Get Current Date
        id: date
        run: echo "date=$(date +'%Y%m%d-%H%M')" >> $GITHUB_OUTPUT

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: NgalocoDetector-${{ steps.date.outputs.date }}-APK
          path: app/build/outputs/apk/debug/*.apk