name: Build NgalocoDetector APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Repair Broken Strings (Emergency)
        run: |
          find . -type f -name "*.kts" -exec sed -i 's/Javaersion/JavaVersion/g' {} +
          find . -type f -name "*.kts" -exec sed -i 's/ERSION_11/VERSION_11/g' {} +

      - name: Restore Gradle Wrapper Jar
        run: |
          mkdir -p gradle/wrapper
          curl -Lo gradle/wrapper/gradle-wrapper.jar https://github.com/gradle/gradle/raw/v7.5.0/gradle/wrapper/gradle-wrapper.jar

      - name: Grant Execute Permission
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: NgalocoDetector-Fixed-APK
          path: app/build/outputs/apk/debug/*.apk